<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff — Brew & Bean</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="admin-page">

  <nav class="navbar navbar-dark admin-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-cup-hot-fill me-2"></i>Brew & Bean
      </a>
      <span class="text-white-50 small">Staff Dashboard</span>
    </div>
  </nav>

  <div class="container py-5">
    <!-- Login -->
    <div id="login-section" class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 p-md-5">
          <h2 class="fw-bold mb-1">Staff Login</h2>
          <p class="text-muted small mb-4">View customer messages from the contact form.</p>
          <form id="login-form">
            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter staff password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
            <div id="login-error" class="alert alert-danger mt-3 d-none small">Wrong password. Try again.</div>
          </form>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
          <h2 class="fw-bold mb-1">Customer Messages</h2>
          <p class="text-muted mb-0" id="message-count">0 messages</p>
        </div>
        <div class="d-flex gap-2">
          <button id="export-btn" class="btn btn-outline-secondary">
            <i class="bi bi-download me-1"></i>Export CSV
          </button>
          <button id="clear-btn" class="btn btn-outline-danger">
            <i class="bi bi-trash me-1"></i>Clear All
          </button>
          <button id="logout-btn" class="btn btn-outline-secondary">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </div>
      </div>

      <div id="no-messages" class="text-center py-5 text-muted d-none">
        <i class="bi bi-inbox display-4 d-block mb-3"></i>
        <p>No messages yet. They'll appear here when customers use the contact form.</p>
        <a href="index.html#contact" class="btn btn-primary mt-2">Go to Contact Form</a>
      </div>

      <div id="messages-list" class="row g-3"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="messages.js"></script>
  <script src="admin.js"></script>
</body>
</html>
